<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#faf7f0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>portfolio</title>
    <!--
      Critical theme: parsed before first paint. Matches PageThemeContext (mobile ≤768px always light; desktop light unless storage is dark).
      next-themes equivalent: attribute="class" + enableSystem — class on <html> is immediate; no transition here.
    -->
    <style id="portfolio-theme-critical">
      html {
        background-color: #faf7f0;
      }
      html.dark {
        background-color: #111111;
        color-scheme: dark;
      }
      body {
        margin: 0;
        background-color: #faf7f0;
      }
      html.dark body {
        background-color: #111111;
      }
    </style>
    <script>
      (function () {
        try {
          var key = 'portfolio-theme'
          var raw = localStorage.getItem(key)
          var mobile = window.matchMedia('(max-width: 768px)').matches
          var dark = !mobile && raw === 'dark'
          document.documentElement.classList.toggle('dark', dark)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
    <script type="text/javascript">
      (function (c, l, a, r, i, t, y) {
        c[a] =
          c[a] ||
          function () {
            ;(c[a].q = c[a].q || []).push(arguments)
          }
        t = l.createElement(r)
        t.async = 1
        t.src = 'https://www.clarity.ms/tag/' + i
        y = l.getElementsByTagName(r)[0]
        y.parentNode.insertBefore(t, y)
      })(window, document, 'clarity', 'script', 'rkmyltvxje')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
